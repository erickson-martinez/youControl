    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Hide scrollbar for Chrome, Safari and Opera */
      .custom-scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .custom-scrollbar-hide {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }
      
      /* Custom scrollbar */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(30, 30, 30, 0.5); 
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(80, 80, 80, 0.8); 
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(100, 100, 100, 1); 
      }
      
      :root {
        --color-gray-900: 18, 18, 18;
        --color-gray-800: 30, 30, 30;
        --color-gray-700: 45, 45, 45;
        --color-gray-600: 61, 61, 61;
        --color-gray-400: 160, 160, 160;
        --color-gray-300: 209, 213, 219;
        --color-text-main: 255, 255, 255;
      }
      
      html.light {
        --color-gray-900: 249, 250, 251; /* main background */
        --color-gray-800: 255, 255, 255; /* cards */
        --color-gray-700: 229, 231, 235; /* borders */
        --color-gray-600: 209, 213, 219; /* hover/borders */
        --color-gray-400: 107, 114, 128; /* muted text */
        --color-gray-300: 75, 85, 99; /* darker text */
        --color-text-main: 17, 24, 39; /* main text */
      }
      
      html.light .text-white {
        color: rgb(var(--color-text-main));
      }
      html.light .text-gray-900, html.light .text-gray-800 {
        color: #111827; /* keep dark text dark on buttons */
      }
      html.light .text-gray-400, html.light .text-gray-300 {
        color: #4b5563;
      }
      html.light .bg-white {
        background-color: rgb(var(--color-gray-800));
      }
      
      /* Ensure buttons with explicit text-white still look good or are overridden manually */
      html.light button.bg-blue-600, html.light button.bg-blue-accent, html.light button.bg-green-accent, html.light button.bg-red-accent {
         color: #ffffff;
      }
      html.light button.bg-blue-600 .text-white, html.light button.bg-blue-accent .text-white {
         color: #ffffff;
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'gray-900': 'rgba(var(--color-gray-900), <alpha-value>)',
              'gray-800': 'rgba(var(--color-gray-800), <alpha-value>)',
              'gray-700': 'rgba(var(--color-gray-700), <alpha-value>)',
              'gray-600': 'rgba(var(--color-gray-600), <alpha-value>)',
              'gray-400': 'rgba(var(--color-gray-400), <alpha-value>)',
              'gray-300': 'rgba(var(--color-gray-300), <alpha-value>)',
              'white': 'rgba(var(--color-text-main), <alpha-value>)',
              'green-accent': '#22c55e',
              'red-accent': '#ef4444',
              'blue-accent': '#3b82f6',
              'yellow-accent': '#eab308',
            }
          }
        }
      }
    </script>
    <script>
      if (localStorage.getItem('theme') === 'light') {
        document.documentElement.classList.add('light');
      }
    </script>
